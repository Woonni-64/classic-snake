<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classic Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <div class="game-header">
          <div>
            <h1 id="game-title">Snake</h1>
            <p>Score <strong id="score">0</strong></p>
          </div>
          <button id="restart" type="button">Restart</button>
        </div>

        <div
          id="board"
          class="board"
          role="grid"
          aria-label="Snake game board"
          tabindex="0"
        ></div>

        <p id="status" class="status" aria-live="polite">
          Press an arrow key or WASD to start.
        </p>

        <div class="controls" aria-label="Snake controls">
          <button type="button" data-direction="up" aria-label="Move up">↑</button>
          <div>
            <button type="button" data-direction="left" aria-label="Move left">←</button>
            <button type="button" data-direction="down" aria-label="Move down">↓</button>
            <button type="button" data-direction="right" aria-label="Move right">→</button>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
